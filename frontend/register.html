<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopCloud — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f7f3ee;
      --card: #ffffff;
      --accent1: #ff5c3a;
      --accent2: #7c3aed;
      --accent3: #059669;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--text);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent1); }

    .nav-links a {
      color: #d1d5db;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      transition: all 0.2s;
    }

    .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .main::before {
      content: '';
      position: absolute;
      top: -100px; left: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(5,150,105,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .main::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      animation: fadeUp 0.5s ease both;
      position: relative;
      z-index: 1;
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent3), #34d399);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 20px rgba(5,150,105,0.3);
    }

    .card-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }

    .card-header p { color: var(--muted); font-size: 0.9rem; }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      color: var(--text);
    }

    input:focus {
      border-color: var(--accent3);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent3), #34d399);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover { opacity: 0.92; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .card-footer-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }

    .card-footer-text a {
      color: var(--accent2);
      font-weight: 600;
      text-decoration: none;
    }

    .card-footer-text a:hover { text-decoration: underline; }

    .alert {
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .alert.show { display: flex; }
    .alert.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Shop<span>Cloud</span></a>
  <div class="nav-links">
    <a href="index.html">← Back to Store</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">✨</div>
      <h1>Create account</h1>
      <p>Join ShopCloud and start shopping</p>
    </div>

    <div class="alert" id="alert"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your name" required/>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" minlength="6" required/>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Create Account
      </button>
    </form>

    <div class="card-footer-text">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  const API = "http://3.110.94.242:5000";

  async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const alert = document.getElementById('alert');

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    alert.className = 'alert';

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.text();

      if (res.ok) {
        alert.className = 'alert success show';
        alert.innerHTML = '✓ Account created! Redirecting to login...';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        alert.className = 'alert error show';
        alert.innerHTML = '✕ ' + data;
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    } catch (err) {
      alert.className = 'alert error show';
      alert.innerHTML = '✕ Could not connect to server. Is it running?';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
