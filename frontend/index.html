<!DOCTYPE html>
<html>
<head>
  <title>Ecommerce</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<h1>🛒 Ecommerce Store</h1>

<div class="container" id="products"></div>

<script>
fetch("http://localhost:5000/products")
.then(res => res.json())
.then(data => {
  let output = "";
  data.forEach(p => {
    output += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <p class="price">₹${p.price}</p>
        <button onclick="addToCart('${p.name}')">Add to Cart</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = output;
});

function addToCart(name) {
  alert(name + " added to cart");
}
</script>

</body>
</html>
