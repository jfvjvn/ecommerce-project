<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopKart — Login</title>
  <script src="/js/api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#f7f5f0; --bg2:#eeeae2; --surface:#ffffff; --border:#e0dbd0; --border2:#ccc8bc; --accent:#c8873a; --accent-dark:#a86820; --accent-light:#fdf3e7; --text:#1a1714; --text2:#5a5550; --muted:#9a9590; --red:#c0392b; --red-light:#fdf0ee; --green:#2d7a4f; --green-light:#edf7f2; --radius:10px; --shadow-lg:0 8px 30px rgba(0,0,0,0.1); }
    body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    h1,h2,h3 { font-family:'Playfair Display',serif; }

    .auth-wrap { width:100%; max-width:420px; padding:1.5rem; }
    .auth-brand { text-align:center; margin-bottom:2rem; }
    .auth-brand a { font-family:'Playfair Display',serif; font-weight:800; font-size:1.5rem; color:var(--text); text-decoration:none; }
    .auth-brand a span { color:var(--accent); }
    .auth-brand p { color:var(--muted); font-size:0.9rem; margin-top:0.4rem; }

    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; box-shadow:var(--shadow-lg); }
    .auth-card h2 { font-size:1.6rem; font-weight:700; margin-bottom:1.5rem; }

    .field { margin-bottom:1.1rem; }
    .field label { display:block; font-size:0.75rem; color:var(--text2); margin-bottom:0.35rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
    .field input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .field input:focus { border-color:var(--accent); background:#fff; }

    .btn-submit { width:100%; padding:0.85rem; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
    .btn-submit:hover { background:var(--accent-dark); }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }

    .auth-footer { text-align:center; margin-top:1.2rem; color:var(--muted); font-size:0.9rem; }
    .auth-footer a { color:var(--accent); text-decoration:none; font-weight:600; }

    .error-box { background:var(--red-light); border:1px solid #e8b4ae; color:var(--red); border-radius:8px; padding:0.7rem 1rem; font-size:0.88rem; margin-bottom:1rem; display:none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <a href="/index.html">✦ <span>ShopKart</span></a>
      <p>Welcome back! Sign in to continue.</p>
    </div>
    <div class="auth-card">
      <h2>Sign In</h2>
      <div id="error-box" class="error-box"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign In</button>
      <div class="auth-footer">No account? <a href="/register.html">Register free</a></div>
    </div>
  </div>
  <script>
    if (isLoggedIn()) window.location.href = "/index.html";
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("error-box");
      errEl.style.display = "none";
      if (!email || !password) { showErr("Please fill in all fields."); return; }
      btn.disabled = true; btn.textContent = "Signing in...";
      try {
        const data = await apiFetch("/login", { method:"POST", body: JSON.stringify({ email, password }) });
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = data.user.role === "admin" ? "/admin.html" : "/index.html";
      } catch(e) {
        showErr(e.message);
        btn.disabled = false; btn.textContent = "Sign In";
      }
    }
    function showErr(msg) { const el = document.getElementById("error-box"); el.textContent = msg; el.style.display = "block"; }
  </script>
</body>
</html>
